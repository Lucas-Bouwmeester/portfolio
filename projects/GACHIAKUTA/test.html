<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #8b3f32;
    }

    .bg-container {
        position: fixed;
        inset: 0;
        display: flex;
    }

    /* Each column */
    .col {
        flex: 0 0 150px;
        height: 100%;
        overflow: hidden;
        position: relative;
    }

    /* Scrolling wrapper */
    .scroll {
        position: absolute;
        width: 100%;
        display: flex;
        flex-direction: column;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
    }

    /* Image tile */
    .tile {
        width: 150px;
        height: 150px;
        background-image: url("images/index/background.png");
        background-size: contain;
        background-repeat: no-repeat;
    }

    /* Moving up */
    .up {
        animation-name: scroll-up;
        animation-duration: 8s;
    }

    /* Moving down */
    .down {
        animation-name: scroll-down;
        animation-duration: 8s;
    }

    @keyframes scroll-up {
        from { transform: translateY(0); }
        to   { transform: translateY(-150px); }
    }

    @keyframes scroll-down {
        from { transform: translateY(-150px); }
        to   { transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="bg-container">
    <!-- Generate as many columns as needed to fill screen -->
    <script>
        const screenWidth = window.innerWidth;
        const columns = Math.ceil(screenWidth / 150);

        const container = document.querySelector('.bg-container');

        for (let i = 0; i < columns; i++) {
            const col = document.createElement('div');
            col.className = 'col';

            const scroll = document.createElement('div');
            scroll.className = 'scroll ' + (i % 2 === 0 ? 'up' : 'down');

            // Add enough tiles to cover and loop
            for (let t = 0; t < 10; t++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                scroll.appendChild(tile);
            }

            col.appendChild(scroll);
            container.appendChild(col);
        }
    </script>
</div>

</body>
</html>
